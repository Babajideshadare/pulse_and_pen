{% extends 'heartline/base.html' %}

{% block content %}
    <h1 class="auth-title">Delete Journal Entry</h1>

    <p>Are you sure you want to delete this journal entry from {{ object.date }}?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
        <a href="{% url 'journalentry-list' %}">Cancel</a>
    </form>
{% endblock %}
